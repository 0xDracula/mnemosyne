name: mnemosyne
version: "0.0.0"
config-version: 2

profile: mnemosyne

model-paths: ["models"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  mnemosyne:
    staging:
      +materialized: view
      +post-hook: "grant select on {{ this }} to rails_app"
    marts:
      +materialized: table
      +post-hook:
        - "grant select on {{ this }} to superset_ro"
        - "grant select on {{ this }} to rails_app"
